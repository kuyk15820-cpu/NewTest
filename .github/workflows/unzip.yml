name: Auto Unzip Any Archive

on:
  push:
    paths:
      - '**.zip'

permissions:
  contents: write

jobs:
  unzip-and-clean:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract all zip files to Root
        run: |
          for f in *.zip; do
            [ -e "$f" ] || continue
            echo "กำลังจัดการแตกไฟล์: $f"
            FOLDER_NAME="${f%.zip}"
            unzip -o "$f" -d ./
            rm "$f"
            if [ -d "$FOLDER_NAME" ]; then
               echo "พบโฟลเดอร์ซ้อนชื่อ $FOLDER_NAME -> กำลังบังคับดึงไฟล์ภายในทั้งหมดออกมาที่หน้าแรก"
               mv "$FOLDER_NAME"/* ./ 2>/dev/null || true
               mv "$FOLDER_NAME"/.* ./ 2>/dev/null || true
               rm -rf "$FOLDER_NAME"
            fi
          done

      - name: Commit and Push Changes back to Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff-index --quiet HEAD; then
            git commit -m "Unpack and force flatten nested zip folder contents to root"
            git push
          else
            echo "ไม่มีการเปลี่ยนแปลงโครงสร้างไฟล์เพิ่มเติม"
          fi
